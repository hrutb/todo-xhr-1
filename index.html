<body>

    <div class="container">
        <div class="row   mt-5">
            <div class="col-md-6 offset-3">
                <div class="card">
                    <div class="card-header bg-warning text-center"><h3>Todo Management</h3></div>
                    <div class="card-body">
                       <form action="" id="todoForm">
                            <div class="form-group">
                                <label for="title">Title*</label>
                                <input type="text" id="title" class="form-control">
                            </div>
                            
                            <div class="form-group">
                                <label for="completed">Status*</label>
                                <select type="text" id="completed" class="form-control">
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select> 
                            </div>
                           
                            <button class="btn btn-block btn-outline-primary" id="addTodo">Add Todo</button>
                           
                            <button class="btn btn-block btn-outline-primary d-none"type="button" id="updateTodo">Update Todo</button>
                            
                       </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
